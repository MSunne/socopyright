<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>系统配置 · 软著申请生成系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { brand: { 50:'#eef2ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca' } },
        fontFamily: { sans: ['"PingFang SC"','"Microsoft YaHei"','-apple-system','"Segoe UI"','Roboto','Arial','sans-serif'] },
      } }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .card { background:#fff; border-radius:14px; box-shadow: 0 0 0 1px rgb(15 23 42 / 0.04), 0 2px 8px rgb(15 23 42 / 0.04); }
    .field-label { font-size:12px; color:#64748b; font-weight:500; letter-spacing:0.2px; display:flex; align-items:center; gap:6px; }
    .field-input {
      width:100%; padding:9px 12px; border-radius:9px; border:1px solid #e2e8f0;
      background:#fff; color:#0f172a; font-size:14px; outline:none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    .field-input:focus { border-color:#818cf8; box-shadow: 0 0 0 4px rgb(99 102 241 / 0.10); }
    .field-input:disabled { background:#f8fafc; color:#64748b; }
    .field-hint { font-size:11px; color:#94a3b8; margin-top:4px; }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:9px; font-size:13.5px; font-weight:500; transition: all .15s; cursor:pointer; border:1px solid transparent; }
    .btn-primary { background:linear-gradient(135deg,#6366f1,#4f46e5); color:#fff; box-shadow: 0 2px 6px rgb(79 70 229 / 0.30); }
    .btn-primary:hover { background:linear-gradient(135deg,#4f46e5,#4338ca); }
    .btn-primary:disabled { background:#e2e8f0; color:#94a3b8; cursor:not-allowed; box-shadow:none; }
    .btn-ghost { background:#fff; border-color:#e2e8f0; color:#475569; }
    .btn-ghost:hover { background:#f8fafc; }
    .alert { padding:10px 14px; border-radius:9px; font-size:13px; }
    .alert-err  { background:#fee2e2; color:#b91c1c; }
    .alert-ok   { background:#d1fae5; color:#047857; }
    .alert-warn { background:#fef3c7; color:#92400e; }
    .tag { font-size:10px; padding:1px 6px; border-radius:4px; font-weight:500; letter-spacing:0.3px; }
    .tag-restart { background:#fef3c7; color:#92400e; }
    .tag-secret  { background:#e0e7ff; color:#4338ca; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen" x-data="admin()" x-init="init()" x-cloak>

<!-- ============ 输入 Admin Token ============ -->
<div x-show="!authed" class="min-h-screen flex items-center justify-center p-4">
  <div class="card w-full max-w-md p-8">
    <h1 class="text-xl font-semibold mb-1">系统配置</h1>
    <p class="text-sm text-slate-500 mb-6">需要管理员令牌才能继续</p>
    <label class="field-label">X-Admin-Token</label>
    <input class="field-input mt-1" type="password" x-model="token"
           @keydown.enter="enter()" placeholder="ADMIN_TOKEN" autofocus />
    <div class="mt-4 flex gap-2">
      <button class="btn btn-primary flex-1 justify-center"
              :disabled="!token || loading" @click="enter()">
        <span x-show="!loading">进入</span>
        <span x-show="loading">验证中...</span>
      </button>
      <a href="/" class="btn btn-ghost">返回首页</a>
    </div>
    <div x-show="err" x-text="err" class="alert alert-err mt-4"></div>
  </div>
</div>

<!-- ============ 配置面板 ============ -->
<div x-show="authed" class="max-w-4xl mx-auto p-4 sm:p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-semibold">系统配置</h1>
      <p class="text-sm text-slate-500">保存时会写入 .env；有副作用的字段（LLM / 并发 / 鉴权 / 目录）立即热生效，带「需重启」标签的需要重启进程</p>
    </div>
    <div class="flex gap-2">
      <a href="/" class="btn btn-ghost">返回首页</a>
      <button class="btn btn-ghost" @click="logout()">锁定</button>
    </div>
  </div>

  <template x-if="msg">
    <div class="alert mb-4 whitespace-pre-line"
         :class="msgType === 'err' ? 'alert-err' : (msgType === 'warn' ? 'alert-warn' : 'alert-ok')"
         x-text="msg"></div>
  </template>

  <!-- 按 group 分组渲染 -->
  <template x-for="group in groups" :key="group">
    <div class="card p-6 mb-4">
      <h2 class="font-medium mb-4" x-text="group"></h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <template x-for="f in fieldsByGroup(group)" :key="f.name">
          <div>
            <label class="field-label">
              <span x-text="f.label"></span>
              <span class="text-slate-400" x-text="'· ' + f.name"></span>
              <span x-show="f.type === 'secret'" class="tag tag-secret">密文</span>
              <span x-show="f.restart" class="tag tag-restart">需重启</span>
            </label>
            <input class="field-input mt-1"
                   :type="f.type === 'secret' ? 'password' : (f.type === 'int' ? 'number' : 'text')"
                   :min="f.min" :max="f.max"
                   :placeholder="f.type === 'secret' ? (f.value || '未设置') : ''"
                   x-model="form[f.name]" />
            <div class="field-hint" x-show="f.hint" x-text="f.hint"></div>
          </div>
        </template>
      </div>
    </div>
  </template>

  <div class="flex items-center gap-3">
    <button class="btn btn-primary" :disabled="saving" @click="save()">
      <span x-show="!saving">保存修改</span>
      <span x-show="saving">保存中...</span>
    </button>
    <button class="btn btn-ghost" @click="load()" :disabled="saving">重新读取</button>
  </div>
</div>

<script>
function admin() {
  return {
    token: sessionStorage.getItem('adminToken') || '',
    authed: false,
    loading: false,
    saving: false,
    err: '',
    msg: '',
    msgType: 'ok',
    fields: [],    // 来自后端的字段元数据（含 value）
    form: {},      // 用户编辑的值；secret 字段初始为后端 value（掩码），后端看到仍是掩码则不改

    get groups() {
      const seen = new Set();
      const out = [];
      for (const f of this.fields) {
        if (!seen.has(f.group)) { seen.add(f.group); out.push(f.group); }
      }
      return out;
    },

    fieldsByGroup(g) {
      return this.fields.filter(f => f.group === g);
    },

    async init() {
      if (this.token) await this.enter();
    },

    async enter() {
      this.err = '';
      this.loading = true;
      try {
        await this.load();
        sessionStorage.setItem('adminToken', this.token);
        this.authed = true;
      } catch (e) {
        this.err = e.message || '请求失败';
      } finally {
        this.loading = false;
      }
    },

    logout() {
      sessionStorage.removeItem('adminToken');
      this.token = '';
      this.authed = false;
      this.msg = '';
    },

    async load() {
      const r = await fetch('/admin/config', {
        headers: { 'X-Admin-Token': this.token },
      });
      if (!r.ok) {
        const detail = await r.text().catch(() => '');
        throw new Error(r.status === 403 ? '管理员令牌无效' : `读取失败：${r.status} ${detail}`);
      }
      const data = await r.json();
      this.fields = data.fields || [];
      // 初始化 form：secret 字段直接拿掩码（保存时与掩码相同即视为不改）
      const next = {};
      for (const f of this.fields) next[f.name] = f.value ?? '';
      this.form = next;
    },

    async save() {
      this.msg = '';
      this.saving = true;
      try {
        // 只提交用户改动过的字段（值和 field.value 不同 → 已改动）
        const body = {};
        for (const f of this.fields) {
          const raw = this.form[f.name];
          if (raw === '' || raw === null || raw === undefined) continue;
          if (String(raw) === String(f.value)) continue; // 没改
          body[f.name] = f.type === 'int' ? Number(raw) : raw;
        }
        if (Object.keys(body).length === 0) {
          this.msg = '没有需要保存的改动';
          this.msgType = 'warn';
          return;
        }

        const r = await fetch('/admin/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': this.token },
          body: JSON.stringify(body),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          this.msg = data.detail || `保存失败：${r.status}`;
          this.msgType = 'err';
          return;
        }

        // ADMIN_TOKEN 被换掉：当前会话立即切新 token
        if (body.ADMIN_TOKEN) {
          this.token = body.ADMIN_TOKEN;
          sessionStorage.setItem('adminToken', body.ADMIN_TOKEN);
        }

        await this.load();

        const notes = data.notes || [];
        if (notes.length) {
          this.msg = '已保存：\n' + notes.map(n => '• ' + n).join('\n');
          this.msgType = 'warn';
        } else {
          this.msg = '已保存并生效';
          this.msgType = 'ok';
        }
      } catch (e) {
        this.msg = e.message || '网络错误';
        this.msgType = 'err';
      } finally {
        this.saving = false;
      }
    },
  };
}
</script>
</body>
</html>
