{% extends "mobile/partials/_app_shell.html" %}
{# 是登录页：全屏，不渲染 nav 和 tabbar #}
{% block content %}
<div style="padding: 60px 28px 0; min-height: 100vh; display: flex; flex-direction: column; background: linear-gradient(180deg, var(--m-accent-soft) 0%, #fff 50%);">
  <div style="text-align: center; margin-bottom: 32px;">
    <div style="width: 76px; height: 76px; border-radius: 18px; margin: 0 auto 16px; background: var(--m-accent); color: #fff; font-size: 36px; font-weight: 700; display:flex; align-items:center; justify-content:center; box-shadow: 0 8px 24px var(--m-accent-soft);">{{ software_name[:1] }}</div>
    <div style="font-size: 22px; font-weight: 700; color: var(--m-text); margin-bottom: 6px;">{{ software_name }}</div>
    <div style="font-size: 13px; color: var(--m-text-soft);">{{ slogan or '让业务管理变得简单高效' }}</div>
  </div>
  <div>
    <label class="m-label">手机号</label>
    <input class="m-input" value="138 0013 {{ phone_tail or '8888' }}" style="margin-bottom: 14px;"/>
    <label class="m-label">验证码</label>
    <div style="display: flex; gap: 10px; margin-bottom: 22px;">
      <input class="m-input" value="••••" style="flex:1;"/>
      <button style="padding: 0 14px; border:1px solid var(--m-accent); color: var(--m-accent); background:#fff; border-radius: 10px; font-size: 13px;">59s 重新发送</button>
    </div>
    <button class="m-btn block" style="margin-bottom: 16px;">登录 / 注册</button>
    <div style="display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--m-text-soft); margin-bottom: 28px;">
      <span style="display: inline-block; width: 14px; height: 14px; border:1.5px solid var(--m-accent); border-radius: 3px; background: var(--m-accent); color:#fff; text-align:center; line-height:11px; font-size:10px;">✓</span>
      <span>已阅读并同意 <span style="color: var(--m-accent);">《用户协议》《隐私政策》</span></span>
    </div>
  </div>
  <div style="margin-top: auto; padding: 24px 0 36px; text-align: center;">
    <div style="font-size: 11px; color: var(--m-text-muted); margin-bottom: 14px;">—— 其他登录方式 ——</div>
    <div style="display: flex; justify-content: center; gap: 28px;">
      <div style="width: 40px; height: 40px; border-radius: 50%; background: #07c160; color: #fff; display:flex; align-items:center; justify-content:center; font-size: 18px;">💬</div>
      <div style="width: 40px; height: 40px; border-radius: 50%; background: #000; color: #fff; display:flex; align-items:center; justify-content:center; font-size: 18px;"></div>
      <div style="width: 40px; height: 40px; border-radius: 50%; background: #f3f4f6; color: var(--m-text); display:flex; align-items:center; justify-content:center; font-size: 14px;">A</div>
    </div>
  </div>
</div>
{% endblock %}
